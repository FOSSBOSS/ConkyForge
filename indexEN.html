<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConkyForge V10.41 - Universal Matrix Update</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --col-text: #f8f8f2;
            --col-accent: #8be9fd;
            --col-cpu: #bd93f9;
            --col-ram: #50fa7b;
            --col-disk: #f1fa8c;
            --col-temp: #ff5555;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--col-text); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 340px; background-color: var(--panel-bg); padding: 15px; box-shadow: 2px 0 5px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 8px; z-index: 10; overflow-y: auto; }
        .tool-btn { background-color: #44475a; color: white; border: 1px solid var(--col-accent); padding: 7px; border-radius: 5px; cursor: pointer; text-align: left; transition: all 0.2s; font-size: 0.82rem; font-weight: 500; }
        .tool-btn:hover { background-color: var(--col-accent); color: #282a36; }
        #workspace { flex-grow: 1; padding: 40px; display: flex; justify-content: flex-start; align-items: flex-start; background-color: #1e1e2e; overflow: auto; }

        #canvas-wrapper { position: relative; margin: auto; }

        #conky-canvas {
            width: 400px; height: 1000px; background-color: rgba(0, 0, 0, 0.4);
            border: 2px dashed #6272a4; border-radius: 10px; position: relative; overflow: hidden;
            transition: transform 0.3s ease; transform-origin: top left;
            background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'DejaVu Sans', sans-serif;
        }

        h2 { margin-top: 5px; font-size: 0.85rem; color: var(--col-accent); border-bottom: 1px solid #44475a; padding-bottom: 3px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px;}

        .conky-block { box-sizing: border-box; position: absolute; background-color: rgba(68, 71, 90, 0.85); border: 1px solid var(--col-accent); padding: 10px; border-radius: 6px; cursor: grab; user-select: none; min-width: 140px; min-height: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); color: var(--col-text); resize: both; overflow: hidden; display: flex; flex-direction: column; }
        .conky-block:active { cursor: grabbing; }
        .conky-block::-webkit-resizer { background-color: var(--col-accent); }
        .close-btn { position: absolute; top: 2px; right: 4px; color: var(--col-temp); cursor: pointer; font-size: 14px; font-weight: bold; z-index: 20; }
        .close-btn:hover { color: #ff0000; }
        .block-title { font-weight: bold; margin-bottom: 5px; display: block; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 3px; flex-shrink: 0; font-size: 13px; color: var(--col-text); }

        .widget-container { display: flex; flex-direction: column; gap: 6px; margin-top: 2px; flex-grow: 1; justify-content: space-around;}
        .widget-row { display: flex; justify-content: space-between; font-size: 13px; font-family: inherit; line-height: 1.2; gap: 15px; color: var(--col-text); }

        .bar-bg { width: 100%; height: 10px; background-color: rgba(255, 255, 255, 0.1); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.2); }
        .bar-fill { height: 100%; border-radius: 4px; }

        .color-cpu { color: var(--col-cpu); background-color: var(--col-cpu); }
        .color-ram { color: var(--col-ram); background-color: var(--col-ram); }
        .color-disk { color: var(--col-disk); background-color: var(--col-disk); }
        .top-header { color: var(--col-accent); font-weight: bold; border-bottom: 1px dashed rgba(255,255,255,0.3); margin-bottom: 2px; padding-bottom: 2px; }

        .graph-box { width: 100%; flex-grow: 1; border-bottom: 2px solid; margin-top: 2px; opacity: 0.7; border-radius: 2px; min-height: 30px;}
        .graph-cpu { background: linear-gradient(to top, var(--col-cpu), transparent); border-color: var(--col-cpu); }
        .graph-net-down { background: linear-gradient(to top, var(--col-accent), transparent); border-color: var(--col-accent); }
        .graph-net-up { background: linear-gradient(to top, var(--col-disk), transparent); border-color: var(--col-disk); }

        .ring-container { width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; margin: 0 auto; flex-grow: 1;}
        .ring-inner { width: 80%; height: 80%; background-color: var(--panel-bg); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ring-val { font-weight: bold; font-size: 1.1rem; } .ring-lbl { font-size: 0.65rem; color: rgba(255,255,255,0.6); margin-top: -2px; }

        .eq-container { display: flex; align-items: flex-end; gap: 2px; width: 100%; height: 100%; min-height: 40px; margin-top: 5px; }
        .eq-bar { background: linear-gradient(to top, var(--col-cpu), var(--col-accent)); flex-grow: 1; border-radius: 2px 2px 0 0; opacity: 0.9; }

        .size-badge { position: absolute; bottom: 2px; right: 2px; background: rgba(0,0,0,0.7); color: var(--col-ram); font-size: 10px; padding: 2px 4px; border-radius: 3px; pointer-events: none; font-family: monospace; }

        .dual-ring-bg { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 6px solid var(--col-temp); border-bottom-color: transparent; opacity: 0.8;}
        .dual-ring-inner { position: absolute; width: 70%; height: 70%; border-radius: 50%; border: 6px solid var(--col-disk); border-bottom-color: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.8;}

        .analog-clock { width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); position: relative; display: flex; align-items: center; justify-content: center;}
        .analog-clock::after { content: ''; width: 6px; height: 6px; background: var(--col-temp); border-radius: 50%; position: absolute; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="color: var(--col-ram); font-size: 1.1rem;">🛠️ ConkyForge V10.41</h2>

        <h2>🎨 Color Palette</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 5px;">
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-text" value="#f8f8f2" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">Base Text</label>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-accent" value="#8be9fd" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">Accent / Icon</label>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-cpu" value="#bd93f9" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">CPU Color</label>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-ram" value="#50fa7b" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">RAM Color</label>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-disk" value="#f1fa8c" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">Disk Color</label>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-temp" value="#ff5555" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">Temp Color</label>
            </div>
        </div>

        <h2>⚙️ Settings</h2>
        <div style="display: flex; gap: 5px;">
            <div><label style="font-size: 0.7rem; color: var(--col-accent);">Width:</label><input type="number" id="config-width" value="400" style="width: 100%; background: #44475a; color: white; border: none; padding: 4px;"></div>
            <div><label style="font-size: 0.7rem; color: var(--col-accent);">Height:</label><input type="number" id="config-height" value="1000" style="width: 100%; background: #44475a; color: white; border: none; padding: 4px;"></div>
        </div>

        <div style="display: flex; gap: 5px;">
            <div style="flex-grow:1;"><label style="font-size: 0.7rem; color: var(--col-disk); font-weight: bold;">Web Zoom:</label><input type="number" id="config-scale" value="1.0" step="0.1" min="0.5" max="4.0" style="width:100%; background: #44475a; color: white; border: 1px solid var(--col-disk); padding: 4px; border-radius: 3px;"></div>
            <div style="flex-grow:1;"><label style="font-size: 0.7rem; color: var(--col-temp); font-weight: bold;">Line Spacing (Y):</label><input type="number" id="config-lineheight" value="16" min="10" max="30" style="width:100%; background: #44475a; color: white; border: 1px solid var(--col-temp); padding: 4px; border-radius: 3px;"></div>
        </div>

        <div style="display: flex; gap: 5px; margin-top: 2px;">
            <div style="flex-grow:1;">
                <label style="font-size: 0.7rem; color: var(--col-ram); font-weight: bold;">System Font:</label>
                <div style="display: flex; gap: 2px;">
                    <select id="config-font" style="width: 100%; background: #44475a; color: white; border: 1px solid var(--col-ram); padding: 4px; border-radius: 3px; outline: none;">
                        <option value="DejaVu Sans">DejaVu Sans</option>
                        <option value="Ubuntu">Ubuntu</option>
                        <option value="Noto Sans">Noto Sans</option>
                        <option value="Roboto">Roboto</option>
                        <option value="Hack">Hack (Mono)</option>
                        <option value="Fira Code">Fira Code (Mono)</option>
                        <option value="Liberation Sans">Liberation Sans</option>
                        <option value="Arial">Arial</option>
                        <option value="CUSTOM">Custom type...</option>
                    </select>
                    <input type="text" id="config-font-custom" placeholder="Ex: Terminus" style="display:none; width: 50%; background: #44475a; color: white; border: 1px solid var(--col-ram); padding: 4px; border-radius: 3px; box-sizing: border-box;">
                </div>
            </div>
            <div style="width: 80px;"><label style="font-size: 0.7rem; color: var(--col-ram); font-weight: bold;">Thickness:</label><input type="number" id="config-thickness" value="14" min="1" max="40" style="width: 100%; background: #44475a; color: white; border: 1px solid var(--col-ram); padding: 4px; border-radius: 3px; box-sizing: border-box;"></div>
        </div>

        <div style="display: flex; gap: 5px; margin-top: 2px;">
            <div style="flex-grow:1;"><label style="font-size: 0.7rem; color: var(--col-accent);">Window Align:</label>
                <select id="config-align" style="width: 100%; background: #44475a; color: white; border: none; padding: 4px; border-radius: 3px;">
                    <option value="top_right">Top Right</option><option value="top_left">Top Left</option>
                    <option value="bottom_right">Bottom Right</option><option value="bottom_left">Bottom Left</option>
                </select>
            </div>
            <div style="flex-grow:1;"><label style="font-size: 0.7rem; color: var(--col-accent);">Monitor ID:</label><input type="number" id="config-monitor" value="1" min="0" style="width: 100%; background: #44475a; color: white; border: none; padding: 4px; border-radius: 3px;"></div>
        </div>

        <div style="margin-top: 2px;">
            <label style="font-size: 0.7rem; color: var(--col-accent);">Absolute Lua Script Path:</label>
            <input type="text" id="config-luapath" value="/home/user/.config/conky/visuals.lua" style="width: 100%; background: #44475a; color: white; border: none; padding: 4px; border-radius: 3px; box-sizing: border-box;">
        </div>

        <button class="tool-btn" id="toggle-preview" style="text-align: center; margin-top:5px;">👁️ Preview Mode</button>

        <h2>🛠️ System & Hardware</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
            <button class="tool-btn" id="add-cpu">⚙️ CPU Bar</button>
            <button class="tool-btn" id="add-ram">🧠 RAM Bar</button>
            <button class="tool-btn" id="add-disk">💾 Disk Bar</button>
            <button class="tool-btn" id="add-temp">🌡️ Temperature</button>
            <button class="tool-btn" id="add-kernel">🐧 Kernel Info</button>
            <button class="tool-btn" id="add-fan" style="border-color: var(--col-accent); font-weight: bold;">🌀 Fans</button>
            <button class="tool-btn" id="add-top-cpu">🔥 Top CPU</button>
            <button class="tool-btn" id="add-top-ram">💥 Top RAM</button>
        </div>

        <h2>🌐 Network & Extras</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
            <button class="tool-btn" id="add-clock" style="border-color: var(--col-accent); font-weight: bold;">🕒 Clock / Date</button>
            <button class="tool-btn" id="add-weather" style="border-color: var(--col-disk); font-weight: bold;">☀️ Local Weather</button>
            <button class="tool-btn" id="add-media" style="border-color: var(--col-ram); font-weight: bold;">[▶] PlayerCTL</button>
            <button class="tool-btn" id="add-audacious" style="border-color: var(--col-ram); font-weight: bold;">🎵 Audacious</button>
            <button class="tool-btn" id="add-net">🌐 Net Speed</button>
            <button class="tool-btn" id="add-ip">🌍 Public IP</button>
            <button class="tool-btn" id="add-email">✉️ Unread Email</button>
            <button class="tool-btn" id="add-graph-net" style="grid-column: span 2;">📉 Net Graph</button>
        </div>

        <h2>📊 Lua Matrix (Cairo)</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
            <button class="tool-btn" id="add-text-horiz" style="border-color: var(--col-temp); font-weight: bold;">🔡 Horizontal Text</button>
            <button class="tool-btn" id="add-text-vert" style="border-color: var(--col-temp); font-weight: bold;">🔠 Vertical Text</button>

            <button class="tool-btn" id="add-analog-clock" style="grid-column: span 2; border-color: var(--col-accent); text-align: center; font-weight: bold;">🧭 ANALOG CLOCK</button>

            <button class="tool-btn" id="add-image" style="border-color: var(--col-disk);">🖼️ PNG Image</button>
            <button class="tool-btn" id="add-anim-png" style="border-color: var(--col-disk); font-weight: bold;">🎬 Animated PNG</button>

            <button class="tool-btn" id="add-ring-cpu" style="border-color: var(--col-cpu);">🟣 CPU Ring</button>
            <button class="tool-btn" id="add-ring-ram" style="border-color: var(--col-ram);">🟢 RAM Ring</button>

            <button class="tool-btn" id="add-ring-gpu-dual" style="grid-column: span 2; border-color: var(--col-temp); text-align: center; font-weight: bold;">🎯 DUAL GPU CONCENTRIC RING</button>

            <button class="tool-btn" id="add-eq-cpu" style="border-color: var(--col-cpu);">📶 CPU EQ Bars</button>
            <button class="tool-btn" id="add-graph-cpu">📈 CPU Graph</button>
        </div>

        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <button class="tool-btn" id="btn-save" style="flex-grow: 1; border-color: var(--col-disk); color: var(--col-disk); text-align: center;">💾 Save</button>
            <button class="tool-btn" id="btn-load" style="flex-grow: 1; border-color: var(--col-accent); color: var(--col-accent); text-align: center;">📂 Load</button>
            <button class="tool-btn" id="btn-clear" style="flex-grow: 1; border-color: var(--col-temp); color: var(--col-temp); text-align: center;">🗑️ Clear</button>
        </div>
        <button class="tool-btn" id="generate-btn" style="background-color: var(--col-ram); color: #282a36; font-weight: bold; text-align: center; margin-top: 5px; margin-bottom: 20px;">FORGE CONKY</button>
    </div>

    <div id="workspace">
        <div id="canvas-wrapper">
            <div id="conky-canvas"></div>
        </div>
    </div>

    <script>
        window.onerror = function(msg, url, line) { console.error("Error detected: " + msg); };

        const canvas = document.getElementById('conky-canvas');
        const wrapper = document.getElementById('canvas-wrapper');
        let blockCounter = 0; let zIndexCounter = 10; let isPreviewMode = false;
        const GRID_SIZE = 20;

        const colorInputs = {
            text: document.getElementById('color-text'),
            accent: document.getElementById('color-accent'),
            cpu: document.getElementById('color-cpu'),
            ram: document.getElementById('color-ram'),
            disk: document.getElementById('color-disk'),
            temp: document.getElementById('color-temp')
        };

        function updateColors() {
            document.documentElement.style.setProperty('--col-text', colorInputs.text.value);
            document.documentElement.style.setProperty('--col-accent', colorInputs.accent.value);
            document.documentElement.style.setProperty('--col-cpu', colorInputs.cpu.value);
            document.documentElement.style.setProperty('--col-ram', colorInputs.ram.value);
            document.documentElement.style.setProperty('--col-disk', colorInputs.disk.value);
            document.documentElement.style.setProperty('--col-temp', colorInputs.temp.value);
        }

        Object.values(colorInputs).forEach(input => {
            input.addEventListener('input', updateColors);
        });

        function hexToRgbRatio(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            return `${r.toFixed(3)}, ${g.toFixed(3)}, ${b.toFixed(3)}`;
        }

        const fontSelect = document.getElementById('config-font');
        const fontCustom = document.getElementById('config-font-custom');

        function updateWebFont() {
            let fontName = fontSelect.value === 'CUSTOM' ? fontCustom.value.trim() : fontSelect.value;
            if (fontName) {
                canvas.style.fontFamily = `"${fontName}", 'DejaVu Sans', sans-serif`;
            }
        }

        fontSelect.addEventListener('change', (e) => {
            if (e.target.value === 'CUSTOM') {
                fontCustom.style.display = 'block';
                fontSelect.style.width = '50%';
            } else {
                fontCustom.style.display = 'none';
                fontSelect.style.width = '100%';
            }
            updateWebFont();
        });
        fontCustom.addEventListener('input', updateWebFont);

        document.getElementById('config-width')?.addEventListener('input', (e) => canvas.style.width = `${e.target.value}px`);
        document.getElementById('config-height')?.addEventListener('input', (e) => canvas.style.height = `${e.target.value}px`);

        document.getElementById('config-scale')?.addEventListener('input', (e) => {
            const scaleVal = parseFloat(e.target.value) || 1.0;
            canvas.style.transform = `scale(${scaleVal})`;
            wrapper.style.width = `${parseFloat(canvas.style.width) * scaleVal}px`;
            wrapper.style.height = `${parseFloat(canvas.style.height) * scaleVal}px`;
        });

        const resizeObserver = new ResizeObserver(entries => {
            for (let entry of entries) {
                const badge = entry.target.querySelector('.size-badge');
                if (badge) {
                    badge.textContent = `${Math.round(entry.contentRect.width)}x${Math.round(entry.contentRect.height)}px`;
                }
            }
        });

        function createBlock(title, type, extraData = '') {
            const block = document.createElement('div');
            block.className = 'conky-block'; block.id = `block-${blockCounter++}`;
            block.dataset.type = type; block.dataset.extra = extraData; block.dataset.title = title;
            block.dataset.offx = 0; block.dataset.offy = 0;

            const offset = Math.round(((blockCounter * 20) % 100) / GRID_SIZE) * GRID_SIZE;
            block.style.left = `${20 + offset}px`; block.style.top = `${20 + offset}px`;
            block.style.zIndex = zIndexCounter;

            let visualContent = '';
            let showTitle = true;
            let needsBadge = false;

            if (['ring_cpu', 'ring_ram', 'ring_gpu_dual', 'disk', 'cpu', 'ram', 'graph_net', 'eq_cpu', 'image', 'anim_png', 'media', 'audacious', 'clock', 'analog_clock', 'weather', 'text_vert', 'text_horiz'].includes(type)) showTitle = false;
            if (['image', 'anim_png', 'text_vert', 'text_horiz', 'graph_net', 'disk', 'cpu', 'ram', 'media', 'audacious', 'clock', 'analog_clock', 'weather'].includes(type)) needsBadge = true;

            switch(type) {
                case 'cpu': { visualContent = `<div style="display:flex; width:100%; align-items:center; gap:8px;"><span style="color:var(--col-cpu); white-space:nowrap; font-size:13px; font-weight:bold;">CPU: 65%</span><div class="bar-bg" style="margin:0; flex-grow:1;"><div class="bar-fill color-cpu" style="width: 65%;"></div></div></div>`; break; }
                case 'ram': { visualContent = `<div style="display:flex; width:100%; align-items:center; gap:8px;"><span style="color:var(--col-ram); white-space:nowrap; font-size:13px; font-weight:bold;">RAM: 4G/16G</span><div class="bar-bg" style="margin:0; flex-grow:1;"><div class="bar-fill color-ram" style="width: 26%;"></div></div></div>`; break; }
                case 'disk': {
                    let diskLabel = extraData;
                    if (diskLabel.startsWith('/mnt/')) diskLabel = diskLabel.substring(5);
                    else if (diskLabel.startsWith('/media/')) diskLabel = diskLabel.substring(7);
                    if (diskLabel === '/') diskLabel = 'Root';
                    if (diskLabel.length > 10) diskLabel = diskLabel.substring(0, 10) + '..';

                    visualContent = `<div style="display:flex; width:100%; align-items:center; gap:8px;"><span style="color:var(--col-disk); white-space:nowrap; font-size:13px; font-weight:bold;">${diskLabel}: 120G</span><div class="bar-bg" style="margin:0; flex-grow:1;"><div class="bar-fill color-disk" style="width: 24%;"></div></div></div>`;
                    break;
                }

                case 'temp': { visualContent = `<div class="widget-container"><div class="widget-row"><span style="color:var(--col-temp)">Core 0</span><span>45°C</span></div></div>`; break; }
                case 'kernel': { visualContent = `<div class="widget-row"><span>Kernel:</span><span style="color:var(--col-accent)">Linux 6.8</span></div>`; break; }
                case 'fan': { visualContent = `<div class="widget-row"><span>Fan:</span><span style="color:var(--col-accent)">1200 RPM</span></div>`; break; }
                case 'xinerama': { visualContent = `<div class="widget-row"><span>Monitor:</span><span style="color:var(--col-accent)">1 - 3840x2160</span></div>`; break; }
                case 'ip': { visualContent = `<div class="widget-row"><span>Pub IP:</span><span style="color:var(--col-accent)">80.12.X.X</span></div>`; break; }
                case 'email': { visualContent = `<div class="widget-row"><span>✉️ Mail:</span><span style="color:var(--col-temp)">0 New</span></div>`; break; }

                case 'clock': {

            let luaCode = "require 'cairo'\n";

            luaCode += "function draw_horizontal_text_spaced(cr, x, y, text, font_size, r, g, b, spacing)\n";

            luaCode += "    cairo_stroke(cr)\n";

            luaCode += "function draw_stacked_vertical_text(cr, box_x, box_y, box_w, box_h, text, font_size, r, g, b, spacing)\n";
            luaCode += "    cairo_select_font_face(cr, '" + userFont + "', CAIRO_FONT_SLANT_NORMAL, CAIRO_FONT_WEIGHT_BOLD)\n";
            luaCode += "    cairo_set_font_size(cr, font_size)\n";
            luaCode += "    cairo_set_source_rgb(cr, r, g, b)\n";
            luaCode += "    local chars = {}\n";
            luaCode += "    local p = 1\n";
            luaCode += "    while p <= string.len(text) do\n";
            luaCode += "        local c = string.byte(text, p)\n";
            luaCode += "        local shift = 1\n";
            luaCode += "        if c > 0 and c <= 127 then shift = 1\n";
            luaCode += "        elseif c >= 192 and c <= 223 then shift = 2\n";
            luaCode += "        elseif c >= 224 and c <= 239 then shift = 3\n";
            luaCode += "        elseif c >= 240 and c <= 247 then shift = 4 end\n";
            luaCode += "        table.insert(chars, string.sub(text, p, p + shift - 1))\n";

            luaCode += "    cairo_set_source_rgba(cr, 1, 1, 1, 0.1)\n";
            luaCode += "    cairo_set_line_width(cr, thickness)\n";
            luaCode += "    cairo_stroke(cr)\n";

            luaCode += "    local m_pt = math.min(mem_val / 100, 1)\n";
            luaCode += "    if m_pt > 0 then\n";
            luaCode += "        cairo_arc(cr, x, y, in_rad, start_a, start_a + (span * m_pt))\n";
            luaCode += "        cairo_set_source_rgba(cr, mem_rgb[1], mem_rgb[2], mem_rgb[3], 1)\n";
            luaCode += "        cairo_stroke(cr)\n";
            luaCode += "    end\n\n";

            luaCode += "    draw_horizontal_text_spaced(cr, x, y - 8, label, 16, txt_rgb[1], txt_rgb[2], txt_rgb[3], 0)\n";
            luaCode += "    draw_horizontal_text_spaced(cr, x, y + 8, temp_val .. '°C', 10, tmp_rgb[1], tmp_rgb[2], tmp_rgb[3], 0)\n";
            luaCode += "    draw_horizontal_text_spaced(cr, x, y + 20, mem_val .. '%', 10, mem_rgb[1], mem_rgb[2], mem_rgb[3], 0)\n";
            luaCode += "end\n\n";

            luaCode += "function draw_eq_vertical(cr, x, y, w, h, count, base_rgb)\n";
            luaCode += "    local space = 2\n";
            luaCode += "    local bar_w = (w / count) - space\n";
            luaCode += "    for i=1, count do\n";
            luaCode += "        local val = tonumber(conky_parse('${cpu cpu'..i..'}')) or 0\n";
            luaCode += "        local pt = val / 100\n";
            luaCode += "        local bar_h = pt * h\n";
            luaCode += "        cairo_rectangle(cr, x + (i-1)*(bar_w+space), y, bar_w, h)\n";
            luaCode += "        cairo_set_source_rgba(cr, 1, 1, 1, 0.05)\n";
            luaCode += "        cairo_fill(cr)\n";
            luaCode += "        local r, g, b = base_rgb[1], base_rgb[2], base_rgb[3]\n";
            luaCode += "        if pt >= 0.80 then r, g, b = 1.0, 0.33, 0.33 end\n";
            luaCode += "        cairo_rectangle(cr, x + (i-1)*(bar_w+space), y + h - bar_h, bar_w, bar_h)\n";
            luaCode += "        cairo_set_source_rgba(cr, r, g, b, 0.9)\n";
            luaCode += "        cairo_fill(cr)\n";
            luaCode += "    end\n";
            luaCode += "end\n\n";

            // EL AUTO-DETECTOR UNIVERSAL
            luaCode += "function conky_main_visuals()\n";
            luaCode += "    if conky_window == nil then return end\n";
            luaCode += "    local cs\n";
            luaCode += "    if cairo_xlib_surface_create ~= nil then\n";
            luaCode += "        cs = cairo_xlib_surface_create(conky_window.display, conky_window.drawable, conky_window.visual, conky_window.width, conky_window.height)\n";
            luaCode += "    elseif cairo_wayland_surface_create ~= nil then\n";
            luaCode += "        cs = cairo_wayland_surface_create(conky_window.display, conky_window.surface, conky_window.width, conky_window.height)\n";
            luaCode += "    else\n";
            luaCode += "        print('ConkyForge Error: No se encontro la superficie de dibujo en cairo (Ni X11 ni Wayland).')\n";
            luaCode += "        return\n";
            luaCode += "    end\n";
            luaCode += "    local cr = cairo_create(cs)\n";
            luaCode += "    local updates = tonumber(conky_parse('${updates}')) or 0\n";
            luaCode += "    if updates > 3 then\n";

            blocks.forEach(vis => {
                const type = vis.dataset.type;
                const sX = (Math.floor(vis.offsetLeft * s) || 0) + parseInt(vis.dataset.offx || 0);
                const sY = (Math.floor(vis.offsetTop * s) || 0) + parseInt(vis.dataset.offy || 0);
                const bWidth = Math.floor(vis.offsetWidth * s) || 40;
                const bHeight = Math.floor(vis.offsetHeight * s) || 20;

                if (type === 'image') {
                    luaCode += `        draw_image_base(cr, ${sX}, ${sY}, ${bWidth}, ${bHeight}, "${vis.dataset.extra}")\n`;
                }
                else if (type === 'anim_png') {
                    let parts = vis.dataset.extra.split(',');
                    let prefix = parts[0];
                    let totalFrames = parseInt(parts[1]) || 30;
                    let speed = parseInt(parts[2]) || 1;
                    luaCode += `        local current_frame = math.floor(updates / ${speed}) % ${totalFrames} + 1\n`;
                    luaCode += `        draw_image_base(cr, ${sX}, ${sY}, ${bWidth}, ${bHeight}, "${prefix}" .. current_frame .. ".png")\n`;
                }
            });

            let rgbText = hexToRgbRatio(colorInputs.text.value);
            let rgbAccent = hexToRgbRatio(colorInputs.accent.value);
            let rgbCpu = hexToRgbRatio(colorInputs.cpu.value);
            let rgbRam = hexToRgbRatio(colorInputs.ram.value);
            let rgbDisk = hexToRgbRatio(colorInputs.disk.value);
            let rgbTemp = hexToRgbRatio(colorInputs.temp.value);

            blocks.forEach(vis => {
                const type = vis.dataset.type;
                const sX = (Math.floor(vis.offsetLeft * s) || 0) + parseInt(vis.dataset.offx || 0);
                const sY = (Math.floor(vis.offsetTop * s) || 0) + parseInt(vis.dataset.offy || 0);
                const bWidth = Math.floor(vis.offsetWidth * s) || 40;
                const bHeight = Math.floor(vis.offsetHeight * s) || 20;

                if (type === 'text_vert') {
                    let parsedData = vis.dataset.extra.split(',');
                    let txtStr = parsedData[0] || "TEXT";
                    let userSize = parseInt(parsedData[1]) || 62;
                    let spacing = parseInt(parsedData[2]) || 0;
                    luaCode += `        draw_stacked_vertical_text(cr, ${sX}, ${sY}, ${bWidth}, ${bHeight}, "${txtStr}", ${Math.floor(userSize * s)}, {${rgbAccent}}, ${spacing})\n`;
                }
                else if (type === 'text_horiz') {
                    let parsedData = vis.dataset.extra.split(',');
                    let txtStr = parsedData[0] || "TEXT";
                    let userSize = parseInt(parsedData[1]) || 24;
                    let spacing = parseInt(parsedData[2]) || 0;
                    const centerX = sX + Math.floor(bWidth / 2);
                    const centerY = sY + Math.floor(bHeight / 2);
                    luaCode += `        draw_horizontal_text_spaced(cr, ${centerX}, ${centerY}, "${txtStr}", ${Math.floor(userSize * s)}, {${rgbAccent}}, ${spacing})\n`;
                }
                else if (type === 'eq_cpu') {
                    let count = parseInt(vis.dataset.extra) || 20;
                    luaCode += `        draw_eq_vertical(cr, ${sX}, ${sY}, ${bWidth}, ${bHeight}, ${count}, {${rgbCpu}})\n`;
                }
                else if (['ring_cpu', 'ring_ram'].includes(type)) {
                    const isCPU = type === 'ring_cpu';
                    const centerX = sX + Math.floor(bWidth / 2);
                    const centerY = sY + Math.floor(bHeight / 2);
                    const dynamicRadius = Math.max(10, Math.floor(Math.min(bWidth, bHeight) / 2) - 15);
                    const fontVal = Math.floor(22 * s); const fontLbl = Math.floor(15 * s); const scaleOff = Math.floor(10 * s);

                    let rgbLuaString, label, conkyVar;
                    if (isCPU) { rgbLuaString = `{${rgbCpu}}`; label = "CPU"; conkyVar = "'${cpu cpu0}'"; }
                    else { rgbLuaString = `{${rgbRam}}`; label = "RAM"; conkyVar = "'${memperc}'"; }

                    let ringThick = Math.floor(baseThickness * 1.5 * s);

                    luaCode += `        local raw_val = tonumber(conky_parse(${conkyVar})) or 0\n`;
                    luaCode += `        draw_ring(cr, {x=${centerX}, y=${centerY}, radius=${dynamicRadius}, thickness=${ringThick}, font_val=${fontVal}, font_lbl=${fontLbl}, scale_offset=${scaleOff}, start_angle=0, end_angle=360, bgc={1,1,1}, bga=0.1, fgc=${rgbLuaString}, fga=1, suffix="%%"}, raw_val/100, raw_val, "${label}")\n`;
                }
                else if (type === 'ring_gpu_dual') {
                    const centerX = sX + Math.floor(bWidth / 2);
                    const centerY = sY + Math.floor(bHeight / 2);
                    const dynamicRadius = Math.max(10, Math.floor(Math.min(bWidth, bHeight) / 2) - 10);

                    let parts = (vis.dataset.extra || "NVIDIA,0").split(',');
                    let vendor = parts[0];
                    let gpuId = parts[1] || "0";
                    let gpuThick = Math.floor(baseThickness * 1.2 * s);

                    if (vendor === 'AMD') {
                        luaCode += `        local gpu_temp = tonumber(conky_parse('\${execi 2 sensors | grep -A 2 "amdgpu" | grep "temp1" | grep -Eo "[0-9]{2,3}\\\\.[0-9]" | head -n 1 | cut -d. -f1}')) or 0\n`;
                        luaCode += `        local amd_vram_used = tonumber(conky_parse('\${execi 2 cat /sys/class/drm/card${gpuId}/device/mem_info_vram_used 2>/dev/null}')) or 0\n`;
                        luaCode += `        local amd_vram_total = tonumber(conky_parse('\${execi 2 cat /sys/class/drm/card${gpuId}/device/mem_info_vram_total 2>/dev/null}')) or 1\n`;
                        luaCode += `        local gpu_mem = math.floor((amd_vram_used / amd_vram_total) * 100)\n`;
                    } else {
                        luaCode += `        local gpu_temp = tonumber(conky_parse('\${execi 2 nvidia-smi -i ${gpuId} --query-gpu=temperature.gpu --format=csv,noheader}')) or 0\n`;
                        luaCode += `        local gpu_mem = tonumber(conky_parse('\${execi 2 nvidia-smi -i ${gpuId} --query-gpu=utilization.memory --format=csv,noheader | tr -d " %%"}')) or 0\n`;
                    }

                    luaCode += `        draw_concentric_gpu(cr, ${centerX}, ${centerY}, ${dynamicRadius}, ${gpuThick}, gpu_temp, gpu_mem, "${vendor} ${gpuId}", {${rgbText}}, {${rgbTemp}}, {${rgbRam}})\n`;
                }
                else if (type === 'analog_clock') {
                    const centerX = sX + Math.floor(bWidth / 2);
                    const centerY = sY + Math.floor(bHeight / 2);
                    const dynamicRadius = Math.max(10, Math.floor(Math.min(bWidth, bHeight) / 2) - 5);

                    luaCode += `        draw_analog_clock(cr, ${centerX}, ${centerY}, ${dynamicRadius}, {${rgbText}}, {${rgbAccent}}, {${rgbTemp}})\n`;
                }
            });

            luaCode += "    end\n    cairo_destroy(cr)\n    cairo_surface_destroy(cs)\nend\n";
            setTimeout(() => downloadFile('visuals.lua', luaCode), 500);

        });
    </script>
