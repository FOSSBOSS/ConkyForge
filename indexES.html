<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConkyForge V10.41.1 - Hotfix Edition (ES)</title>
    <link rel="stylesheet" media="screen" href="css/style.css">
</head>
<body>
    <div id="sidebar">
        <h2 style="color: var(--col-ram); font-size: 1.1rem;">🛠️ ConkyForge V10.41.1</h2>

        <h2>🎨 Paleta de Colores</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 5px;">
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-text" value="#f8f8f2" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">Texto Base</label>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-accent" value="#8be9fd" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">Acento / Icono</label>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-cpu" value="#bd93f9" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">Color CPU</label>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-ram" value="#50fa7b" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">Color RAM</label>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-disk" value="#f1fa8c" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">Color Disco</label>
            </div>
            <div style="display:flex; align-items:center; gap:5px; background:#44475a; padding:3px; border-radius:3px;">
                <input type="color" id="color-temp" value="#ff5555" style="width:25px; height:25px; border:none; padding:0; cursor:pointer;">
                <label style="font-size: 0.65rem; color: white;">Color Temp</label>
            </div>
        </div>

        <h2>⚙️ Ajustes</h2>
        <div style="display: flex; gap: 5px;">
            <div><label style="font-size: 0.7rem; color: var(--col-accent);">Ancho:</label><input type="number" id="config-width" value="400" style="width: 100%; background: #44475a; color: white; border: none; padding: 4px;"></div>
            <div><label style="font-size: 0.7rem; color: var(--col-accent);">Alto:</label><input type="number" id="config-height" value="1000" style="width: 100%; background: #44475a; color: white; border: none; padding: 4px;"></div>
        </div>

        <div style="display: flex; gap: 5px;">
            <div style="flex-grow:1;"><label style="font-size: 0.7rem; color: var(--col-disk); font-weight: bold;">Zoom Web:</label><input type="number" id="config-scale" value="1.0" step="0.1" min="0.5" max="4.0" style="width:100%; background: #44475a; color: white; border: 1px solid var(--col-disk); padding: 4px; border-radius: 3px;"></div>
            <div style="flex-grow:1;"><label style="font-size: 0.7rem; color: var(--col-temp); font-weight: bold;">Interlineado (Y):</label><input type="number" id="config-lineheight" value="16" min="10" max="30" style="width:100%; background: #44475a; color: white; border: 1px solid var(--col-temp); padding: 4px; border-radius: 3px;"></div>
        </div>

        <div style="display: flex; gap: 5px; margin-top: 2px;">
            <div style="flex-grow:1;">
                <label style="font-size: 0.7rem; color: var(--col-ram); font-weight: bold;">Fuente del Sistema:</label>
                <div style="display: flex; gap: 2px;">
                    <select id="config-font" style="width: 100%; background: #44475a; color: white; border: 1px solid var(--col-ram); padding: 4px; border-radius: 3px; outline: none;">
                        <option value="DejaVu Sans">DejaVu Sans</option>
                        <option value="Ubuntu">Ubuntu</option>
                        <option value="Noto Sans">Noto Sans</option>
                        <option value="Roboto">Roboto</option>
                        <option value="Hack">Hack (Mono)</option>
                        <option value="Fira Code">Fira Code (Mono)</option>
                        <option value="Liberation Sans">Liberation Sans</option>
                        <option value="Arial">Arial</option>
                        <option value="CUSTOM">Fuente personalizada...</option>
                    </select>
                    <input type="text" id="config-font-custom" placeholder="Ej: Terminus" style="display:none; width: 50%; background: #44475a; color: white; border: 1px solid var(--col-ram); padding: 4px; border-radius: 3px; box-sizing: border-box;">
                </div>
            </div>
            <div style="width: 80px;"><label style="font-size: 0.7rem; color: var(--col-ram); font-weight: bold;">Grosor:</label><input type="number" id="config-thickness" value="14" min="1" max="40" style="width: 100%; background: #44475a; color: white; border: 1px solid var(--col-ram); padding: 4px; border-radius: 3px; box-sizing: border-box;"></div>
        </div>

        <div style="display: flex; gap: 5px; margin-top: 2px;">
            <div style="flex-grow:1;"><label style="font-size: 0.7rem; color: var(--col-accent);">Alineación:</label>
                <select id="config-align" style="width: 100%; background: #44475a; color: white; border: none; padding: 4px; border-radius: 3px;">
                    <option value="top_right">Arriba Derecha</option><option value="top_left">Arriba Izquierda</option>
                    <option value="bottom_right">Abajo Derecha</option><option value="bottom_left">Abajo Izquierda</option>
                </select>
            </div>
            <div style="flex-grow:1;"><label style="font-size: 0.7rem; color: var(--col-accent);">ID Monitor:</label><input type="number" id="config-monitor" value="1" min="0" style="width: 100%; background: #44475a; color: white; border: none; padding: 4px; border-radius: 3px;"></div>
        </div>

        <div style="margin-top: 2px;">
            <label style="font-size: 0.7rem; color: var(--col-accent);">Ruta Absoluta del Script Lua:</label>
            <input type="text" id="config-luapath" value="/home/usuario/.config/conky/visuals.lua" style="width: 100%; background: #44475a; color: white; border: none; padding: 4px; border-radius: 3px; box-sizing: border-box;">
        </div>

        <button class="tool-btn" id="toggle-preview" style="text-align: center; margin-top:5px;">👁️ Modo Vista Previa</button>

        <h2>🛠️ Sistema y Hardware</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
            <button class="tool-btn" id="add-cpu">⚙️ Barra CPU</button>
            <button class="tool-btn" id="add-ram">🧠 Barra RAM</button>
            <button class="tool-btn" id="add-disk">💾 Barra Disco</button>
            <button class="tool-btn" id="add-temp">🌡️ Temperatura</button>
            <button class="tool-btn" id="add-kernel">🐧 Info Kernel</button>
            <button class="tool-btn" id="add-fan" style="border-color: var(--col-accent); font-weight: bold;">🌀 Ventiladores</button>
            <button class="tool-btn" id="add-top-cpu">🔥 Top CPU</button>
            <button class="tool-btn" id="add-top-ram">💥 Top RAM</button>
        </div>

        <h2>🌐 Red y Extras</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
            <button class="tool-btn" id="add-clock" style="border-color: var(--col-accent); font-weight: bold;">🕒 Reloj / Fecha</button>
            <button class="tool-btn" id="add-weather" style="border-color: var(--col-disk); font-weight: bold;">☀️ Clima Local</button>
            <button class="tool-btn" id="add-media" style="border-color: var(--col-ram); font-weight: bold;">[▶] PlayerCTL</button>
            <button class="tool-btn" id="add-audacious" style="border-color: var(--col-ram); font-weight: bold;">🎵 Audacious</button>
            <button class="tool-btn" id="add-net">🌐 Velocidad Red</button>
            <button class="tool-btn" id="add-ip">🌍 IP Pública</button>
            <button class="tool-btn" id="add-email">✉️ Email sin leer</button>
            <button class="tool-btn" id="add-graph-net" style="grid-column: span 2;">📉 Gráfico de Red</button>
        </div>

        <h2>📊 Matriz Lua (Cairo)</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
            <button class="tool-btn" id="add-text-horiz" style="border-color: var(--col-temp); font-weight: bold;">🔡 Texto Horizontal</button>
            <button class="tool-btn" id="add-text-vert" style="border-color: var(--col-temp); font-weight: bold;">🔠 Texto Vertical</button>

            <button class="tool-btn" id="add-analog-clock" style="grid-column: span 2; border-color: var(--col-accent); text-align: center; font-weight: bold;">🧭 RELOJ ANALÓGICO</button>

            <button class="tool-btn" id="add-image" style="border-color: var(--col-disk);">🖼️ Imagen PNG</button>
            <button class="tool-btn" id="add-anim-png" style="border-color: var(--col-disk); font-weight: bold;">🎬 PNG Animado</button>

            <button class="tool-btn" id="add-ring-cpu" style="border-color: var(--col-cpu);">🟣 Anillo CPU</button>
            <button class="tool-btn" id="add-ring-ram" style="border-color: var(--col-ram);">🟢 Anillo RAM</button>

            <button class="tool-btn" id="add-ring-gpu-dual" style="grid-column: span 2; border-color: var(--col-temp); text-align: center; font-weight: bold;">🎯 ANILLO CONCÉNTRICO DUAL GPU</button>

            <button class="tool-btn" id="add-eq-cpu" style="border-color: var(--col-cpu);">📶 Barras EQ CPU</button>
            <button class="tool-btn" id="add-graph-cpu">📈 Gráfico CPU</button>
        </div>

        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <button class="tool-btn" id="btn-save" style="flex-grow: 1; border-color: var(--col-disk); color: var(--col-disk); text-align: center;">💾 Guardar</button>
            <button class="tool-btn" id="btn-load" style="flex-grow: 1; border-color: var(--col-accent); color: var(--col-accent); text-align: center;">📂 Cargar</button>
            <button class="tool-btn" id="btn-clear" style="flex-grow: 1; border-color: var(--col-temp); color: var(--col-temp); text-align: center;">🗑️ Limpiar</button>
        </div>
        <button class="tool-btn" id="generate-btn" style="background-color: var(--col-ram); color: #282a36; font-weight: bold; text-align: center; margin-top: 5px; margin-bottom: 20px;">FORJAR CONKY</button>
    </div>

    <div id="workspace">
        <div id="canvas-wrapper">
            <div id="conky-canvas"></div>
        </div>
    </div>
<script src="js/script.js"></script>
</body>
</html>
